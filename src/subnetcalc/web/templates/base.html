<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Subnetting Simulator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a href="{{ url_for('index') }}" class="brand">
        <span class="logo">⌬</span> subnetting-sim
      </a>
      <nav>
        <a href="https://github.com/Leuksito/subnetting-sim">GitHub</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="wrap">
    <small>subnetting-sim · IPv4 / IPv6 · MIT · © Leuksito</small>
  </footer>
</body>
</html>
